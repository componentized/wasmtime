name: Publish dev

on:
  workflow_call:
    inputs:
      git-ref:
        description: git-ref version to build
        type: string
        default: refs/tags/dev
  workflow_dispatch:
    inputs:
      git-ref:
        description: git-ref version to build
        type: string
        default: refs/tags/dev

jobs:

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      rust-toolchain: ${{ steps.versions.outputs.rust-toolchain }}
      git-sha: ${{ steps.versions.outputs.git-sha }}
      git-sha-short: ${{ steps.versions.outputs.git-sha-short }}
      git-date: ${{ steps.versions.outputs.git-date }}
    steps:
    - uses: actions/checkout@v7
    - name: Resolve versions
      id: versions
      run: |
        set -euo pipefail

        echo "rust-toolchain=$(yq -r '.toolchain.channel' rust-toolchain.toml)" | tee -a "${GITHUB_OUTPUT}"

        git_commit=$(gh api repos/bytecodealliance/wasmtime/commits/${{ inputs.git-ref || 'refs/tags/dev' }} --template '{{.sha}} {{.commit.committer.date}}')
        git_sha="$(echo "${git_commit}" | cut -d' ' -f1)"
        git_date="$(echo "${git_commit}" | cut -d' ' -f2)"
        echo "git-sha=${git_sha}" | tee -a "${GITHUB_OUTPUT}"
        echo "git-sha-short=${git_sha:0:7}" | tee -a "${GITHUB_OUTPUT}"
        echo "git-date=${git_date:0:10}" | tee -a "${GITHUB_OUTPUT}"
      env:
        GH_TOKEN: ${{ github.token }}

  build:
    name: Build
    permissions:
      packages: write
      id-token: write
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
        - tag: dev-${{ needs.preflight.outputs.git-sha }}
          additional-tags: |
            dev-${{ needs.preflight.outputs.git-sha-short }}
            dev-${{ needs.preflight.outputs.git-date }}
            dev
            latest
        - tag: dev-${{ needs.preflight.outputs.git-sha }}-alpine
          additional-tags: |
            dev-${{ needs.preflight.outputs.git-sha-short }}-alpine
            dev-${{ needs.preflight.outputs.git-date }}-alpine
            dev-alpine
    uses: ./.github/workflows/publish-version.yaml
    with:
      rust-toolchain: "${{ needs.preflight.outputs.rust-toolchain }}"
      wasmtime-git-sha: ${{ needs.preflight.outputs.git-sha }}
      repository: dev
      tag: ${{ matrix.tag }}
      additional-tags: ${{ matrix.additional-tags }}
      publish: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit
