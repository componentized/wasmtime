name: Dependabot auto-merge

on:
  push:
    branches:
    - 'dependabot/cargo/versions/wasmtime/**'

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.repository == 'componentized/wasmtime'
    steps:
      - name: Set PR to auto-merge
        run: gh pr merge --auto --squash ${{ github.ref_name }}
        env:
          # since new GitHub Action workflows are not triggered by existing workflows,
          # use custom PAT so the resulting merge commit triggers the push workflow
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
