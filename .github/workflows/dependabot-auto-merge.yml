# Automatically approve and merge Dependabot PRs for minor and patch updates
# derived from https://lethain.com/dependabot-auto-merge/
name: Dependabot auto-merge
on: pull_request

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'componentized/wasmtime'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GH_TOKEN }}"
      - name: Set PR to auto-merge
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' && steps.metadata.outputs.dependency-names == 'wasmtime-cli'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
